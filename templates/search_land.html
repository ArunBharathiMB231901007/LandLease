{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Search Land</h2>
    <form method="POST" style="margin-bottom:20px">
        <div class="form-group"><label>Search by Location</label><input name="location" placeholder="Enter location"></div>
        <button class="btn btn-green" type="submit">Search</button>
    </form>
</div>
{% if lands %}
<div class="grid">
    {% for land in lands %}
    <div class="land-card">
        <h3>{{ land[2] }}</h3>
        <p>₹{{ land[3] }} / hour</p>
        <a href="/book/{{ land[0] }}" class="btn btn-blue">Book Now</a>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="card"><p>No lands found.</p></div>
{% endif %}
{% endblock %}
