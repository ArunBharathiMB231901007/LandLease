{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Add Land</h2>
    <form method="POST">
        <div class="form-group"><label>Location</label><input name="location" required></div>
        <div class="form-group"><label>Price per Hour (₹)</label><input name="price" type="number" required></div>
        <button class="btn btn-green" type="submit">Add Land</button>
    </form>
</div>
{% endblock %}
