{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Owner Registration</h2>
    <form method="POST">
        <div class="form-group"><label>Name</label><input name="name" required></div>
        <div class="form-group"><label>Phone</label><input name="phone" required></div>
        <div class="form-group"><label>Password</label><input name="password" type="password" required></div>
        <div class="form-group"><label>Aadhaar Number</label><input name="aadhaar" required></div>
        <div class="form-group"><label>Patta Number</label><input name="patta" required></div>
        <div class="form-group"><label>EC Number</label><input name="ec" required></div>
        <button class="btn btn-green" type="submit">Register</button>
    </form>
</div>
{% endblock %}
